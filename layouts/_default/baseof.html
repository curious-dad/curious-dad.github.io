<!doctype html>
<html lang="{{ site.Language.Locale | default "en-US" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body{{ if eq .Section "posts" }} class="article-page"{{ end }}>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="site-shell">
      {{ if eq .Section "posts" }}
        {{ partial "article-nav.html" (dict "context" .) }}
      {{ else }}
        {{ partial "header.html" . }}
      {{ end }}
      <main id="main" class="site-main">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
