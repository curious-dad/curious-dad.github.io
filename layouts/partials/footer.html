<footer class="site-footer">
  <div class="footer-inner">
    <span>© {{ now.Year }} Curious Dad</span>
    <span>Made with curiosity · <a href="{{ "index.xml" | relURL }}">RSS</a></span>
  </div>
</footer>
<script>
  (function () {
    var root = document.documentElement;
    var themeButton = document.querySelector('.theme-toggle');
    var menuButton = document.querySelector('.menu-toggle');
    var nav = document.querySelector('.site-nav');

    if (themeButton) themeButton.addEventListener('click', function () {
      var next = root.dataset.theme === 'dark' ? 'light' : 'dark';
      if (next === 'dark') root.dataset.theme = 'dark'; else delete root.dataset.theme;
      localStorage.setItem('curious-dad-theme', next);
    });

    if (menuButton && nav) menuButton.addEventListener('click', function () {
      var open = menuButton.getAttribute('aria-expanded') === 'true';
      menuButton.setAttribute('aria-expanded', String(!open));
      nav.classList.toggle('open', !open);
    });
  }());
</script>
